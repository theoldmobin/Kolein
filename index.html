  function copySchedule() {
    let text = 'برنامه مطالعه استادی‌فلو\n' + '═'.repeat(40) + '\n\n';
    schedule.forEach(day => {
      text += `─── روز ${day.day} ───\n`;
      day.sessions.forEach(s => {
        if (s.type === 'study') {
          text += `  ${s.startTime} - ${s.endTime}  |  ${s.subject}  |  ${formatDuration(s.duration)}${s.notes ? '  |  ' + s.notes : ''}\n`;
        } else if (s.type === 'lunch') {
          text += `  ${s.startTime} - ${s.endTime}  |  استراحت ناهار  |  ${formatDuration(s.duration)}\n`;
        } else {
          text += `  ${s.startTime} - ${s.endTime}  |  استراحت  |  ${formatDuration(s.duration)}\n`;
        }
      });
      text += '\n';
    });

    navigator.clipboard.writeText(text).then(() => {
      showToast('برنامه در کلیپ‌بورد کپی شد', 'success');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      showToast('برنامه در کلیپ‌بورد کپی شد', 'success');
    });
  }

  /* ====================== کانفتی ====================== */
  function launchConfetti() {
    const canvas = DOM.confettiCanvas;
    canvas.style.display = 'block';
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const particles = [];
    const colors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#1abc9c','#e84393'];
    const w = window.innerWidth;
    const h = window.innerHeight;

    for (let i = 0; i < 150; i++) {
      particles.push({
        x: w / 2 + (Math.random() - 0.5) * 300,
        y: h / 2 - 100,
        vx: (Math.random() - 0.5) * 16,
        vy: Math.random() * -14 - 4,
        pw: Math.random() * 8 + 4,
        ph: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12,
        gravity: 0.25 + Math.random() * 0.1,
        opacity: 1,
        decay: 0.005 + Math.random() * 0.005
      });
    }

    let animId;
    function animate() {
      ctx.clearRect(0, 0, w, h);
      let alive = false;
      particles.forEach(p => {
        if (p.opacity <= 0) return;
        alive = true;
        p.x += p.vx;
        p.vy += p.gravity;
        p.y += p.vy;
        p.vx *= 0.99;
        p.rotation += p.rotSpeed;
        p.opacity -= p.decay;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.pw / 2, -p.ph / 2, p.pw, p.ph);
        ctx.restore();
      });

      if (alive) {
        animId = requestAnimationFrame(animate);
      } else {
        canvas.style.display = 'none';
        cancelAnimationFrame(animId);
      }
    }
    animate();
  }

  /* ====================== حافظه محلی ====================== */
  function saveToStorage() {
    try {
      const data = {
        subjects,
        schedule,
        subjectColors,
        studyDays: DOM.studyDays.value,
        difficulty: DOM.difficulty.value,
        dailyHours: DOM.dailyHours.value,
        sessionLength: DOM.sessionLength.value,
        breakLength: DOM.breakLength.value,
        startTime: DOM.startTime.value,
        subjectIdCounter
      };
      localStorage.setItem('sf_data', JSON.stringify(data));
    } catch (e) {
      // حافظه ممکن است پر باشد
    }
  }

  function loadFromStorage() {
    try {
      const raw = localStorage.getItem('sf_data');
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.subjects && Array.isArray(data.subjects)) {
        subjects = data.subjects;
        subjectIdCounter = data.subjectIdCounter || subjects.length;
      }
      if (data.schedule && Array.isArray(data.schedule)) {
        schedule = data.schedule;
      }
      if (data.subjectColors) subjectColors = data.subjectColors;
      if (data.studyDays) DOM.studyDays.value = data.studyDays;
      if (data.difficulty) {
        DOM.difficulty.value = data.difficulty;
        updateDifficultyDisplay();
      }
      if (data.dailyHours) {
        DOM.dailyHours.value = data.dailyHours;
        DOM.dailyHoursVal.textContent = data.dailyHours + ' ساعت';
      }
      if (data.sessionLength) DOM.sessionLength.value = data.sessionLength;
      if (data.breakLength) DOM.breakLength.value = data.breakLength;
      if (data.startTime) DOM.startTime.value = data.startTime;
      return schedule.length > 0;
    } catch (e) {
      return false;
    }
  }

  /* ====================== نمایش سختی ====================== */
  function updateDifficultyDisplay() {
    const val = Number(DOM.difficulty.value);
    DOM.diffDisplay.textContent = DIFFICULTY_NAMES[val - 1];

  /* ====================== تولید برنامه ====================== */
  function handleGenerate() {
    if (!validateForm()) {
      showToast('لطفاً خطاهای بالا را رفع کنید', 'error');
      return;
    }

    undoStack = [];
    redoStack = [];
    updateUndoRedoButtons();

    generateSchedule();

    DOM.scheduleSection.style.display = 'block';
    DOM.statsSection.style.display = 'block';
    currentPage = 0;

    renderTable();
    renderStats();
    if (currentView === 'calendar') renderCalendar();

    DOM.scheduleSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    launchConfetti();
    saveToStorage();

    showToast(`برنامه تولید شد: ${schedule.length} روز`, 'success');
  }

  /* ====================== تغییر نمای ====================== */
  function switchView(view) {
    currentView = view;
    DOM.tabTable.classList.toggle('active', view === 'table');
    DOM.tabCalendar.classList.toggle('active', view === 'calendar');
    DOM.tabTable.setAttribute('aria-selected', view === 'table');
    DOM.tabCalendar.setAttribute('aria-selected', view === 'calendar');
    DOM.tableView.style.display = view === 'table' ? '' : 'none';
    DOM.calendarView.style.display = view === 'calendar' ? '' : 'none';
    DOM.pagination.style.display = view === 'table' ? '' : 'none';

    if (view === 'calendar') {
      calMonth = 0;
      renderCalendar();
    }
  }

  /* ====================== صفحه‌بندی ====================== */
  function changePage(delta) {
    const maxPage = Math.ceil(schedule.length / pageSize) - 1;
    currentPage = clamp(currentPage + delta, 0, maxPage);
    renderTable();
  }

  /* ====================== اتصال رویدادها ====================== */
  function bindEvents() {
    DOM.themeToggle.addEventListener('click', toggleTheme);
    DOM.undoBtn.addEventListener('click', undo);
    DOM.redoBtn.addEventListener('click', redo);

    DOM.inputToggle.addEventListener('click', () => toggleSection(DOM.inputToggle, DOM.inputBody));
    DOM.inputToggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleSection(DOM.inputToggle, DOM.inputBody);
      }
    });

    DOM.addSubjectBtn.addEventListener('click', addSubject);
    DOM.searchSubjects.addEventListener('input', (e) => renderSubjects(e.target.value));
    DOM.difficulty.addEventListener('input', updateDifficultyDisplay);
    DOM.dailyHours.addEventListener('input', () => {
      DOM.dailyHoursVal.textContent = DOM.dailyHours.value + ' ساعت';
    });

    DOM.generateBtn.addEventListener('click', handleGenerate);

    DOM.tabTable.addEventListener('click', () => switchView('table'));
    DOM.tabCalendar.addEventListener('click', () => switchView('calendar'));

    DOM.prevPage.addEventListener('click', () => changePage(-1));
    DOM.nextPage.addEventListener('click', () => changePage(1));
    DOM.pageSizeSelect.addEventListener('change', (e) => {
      pageSize = Number(e.target.value);
      currentPage = 0;
      renderTable();
    });

    DOM.prevMonth.addEventListener('click', () => { calMonth--; renderCalendar(); });
    DOM.nextMonth.addEventListener('click', () => { calMonth++; renderCalendar(); });

    DOM.exportPrint.addEventListener('click', printSchedule);
    DOM.exportPNG.addEventListener('click', exportPNG);
    DOM.exportCopy.addEventListener('click', copySchedule);
    DOM.resetBtn.addEventListener('click', resetPlanner);

    let saveTimer;
    const debouncedSave = () => { clearTimeout(saveTimer); saveTimer = setTimeout(saveToStorage, 1000); };
    [DOM.studyDays, DOM.difficulty, DOM.dailyHours, DOM.sessionLength, DOM.breakLength, DOM.startTime].forEach(el => {
      el.addEventListener('input', debouncedSave);
      el.addEventListener('change', debouncedSave);
    });

    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (schedule.length > 0) renderStats();
      }, 250);
    });
  }

  /* ====================== راه‌اندازی ====================== */
  function init() {
    initTheme();
    showRandomQuote();

    const hasSchedule = loadFromStorage();
    renderSubjects();

    if (hasSchedule) {
      DOM.scheduleSection.style.display = 'block';
      DOM.statsSection.style.display = 'block';
      renderTable();
      renderStats();
    } else if (subjects.length === 0) {
      subjects = [
        createSubject('ریاضیات', 1, 4, 12),
        createSubject('فیزیک', 2, 3, 8),
        createSubject('علوم کامپیوتر', 1, 4, 10),
        createSubject('ادبیات فارسی', 4, 2, 4),
        createSubject('شیمی', 3, 3, 6)
      ];
      renderSubjects();
    }

    updateDifficultyDisplay();
    bindEvents();

    setTimeout(() => {
      DOM.loader.classList.add('hidden');
      DOM.app.classList.add('visible');
    }, 400);
  }

  // پولی‌فیل roundRect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      this.closePath();
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
